<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate"/>
  <title>The Star Wars Project</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; }
    #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; font-family: monospace; }
    #hud-left { position: absolute; top: 14px; left: 16px; color: #00ff88; text-shadow: 0 0 8px #00ff88; font-size: 11px; line-height: 1.8; }
    #hud-right { position: absolute; top: 14px; right: 16px; color: #00ff88; text-shadow: 0 0 6px #00ff88; font-size: 10px; text-align: right; opacity: 0.7; }
    #status { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); border: 1px solid rgba(0,255,136,0.25); color: #00ff88; text-shadow: 0 0 8px #00ff88; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; padding: 10px 24px; border-radius: 2px; white-space: nowrap; transition: all 0.4s; }
    .corner { position: absolute; width: 28px; height: 28px; border-color: rgba(0,255,136,0.5); border-style: solid; transition: border-color 0.4s, box-shadow 0.4s; }
    #c-tl { top: 56px; left: 12px; border-width: 1px 0 0 1px; }
    #c-tr { top: 56px; right: 12px; border-width: 1px 1px 0 0; }
    #c-bl { bottom: 16px; left: 12px; border-width: 0 0 1px 1px; }
    #c-br { bottom: 16px; right: 12px; border-width: 0 1px 1px 0; }
    #scan-line { position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, #00ff88, transparent); animation: scan 3s linear infinite; opacity: 0.4; }
    @keyframes scan { 0% { top: 0; } 100% { top: 100vh; } }
    .blink { animation: blink 1.2s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    #laser-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
  </style>
</head>
<body>

<!-- Laser + explosion canvas sits over the AR camera -->
<canvas id="laser-canvas"></canvas>

<div id="ui">
  <div id="scan-line"></div>
  <div id="hud-left">

    <span class="blink" id="dot">&#9673;</span> <span id="scan-text">SCANNING TARGET...</span><br>

  </div>
  <div id="hud-right">PORTSMOUTH, UK<br>ASTORIA TOWER<br>TARGET: 0</div>
  <div class="corner" id="c-tl"></div>
  <div class="corner" id="c-tr"></div>
  <div class="corner" id="c-bl"></div>
  <div class="corner" id="c-br"></div>
  <div id="status">Loading...</div>
</div>

let imgReady = false;
explosionImg.onload = () => { imgReady = true; };

let active = false;
let animId = null;
let lasers = [];
let explosions = [];

// ── HUD elements ──────────────────────────────────────────────────
const statusEl  = document.getElementById("status");
const scanText  = document.getElementById("scan-text");
const dot       = document.getElementById("dot");
const scanLine  = document.getElementById("scan-line");
const corners   = document.querySelectorAll(".corner");

// ── MindAR events ─────────────────────────────────────────────────
const scene = document.querySelector("a-scene");
scene.addEventListener("loaded", () => {
  statusEl.textContent = "Point camera at Astoria building";

  const target = document.querySelector("[mindar-image-target]");
  if (target) {
    target.addEventListener("targetFound", onLock);
    target.addEventListener("targetLost",  onLost);
  }
});

function onLock() {
  active = true;
  statusEl.textContent = "TARGET LOCKED — ASTORIA TOWER";
  statusEl.style.color = "#ff4400"; statusEl.style.textShadow = "0 0 15px #ff4400"; statusEl.style.borderColor = "rgba(255,68,0,0.4)";
  scanText.textContent = "TARGET ACQUIRED"; scanText.style.color = "#ff4400";
  dot.style.color = "#ff4400"; dot.style.animation = "none";
  scanLine.style.background = "linear-gradient(90deg,transparent,#ff4400,transparent)";
  corners.forEach(c => { c.style.borderColor = "rgba(255,68,0,0.8)"; c.style.boxShadow = "0 0 8px #ff4400"; });
  spawnLasers(performance.now());
  requestAnimationFrame(draw);
}

function onLost() {
  active = false;
  if (animId) cancelAnimationFrame(animId);
  ctx.clearRect(0, 0, W, H);
  lasers = []; explosions = [];
  statusEl.textContent = "Point camera at Astoria building";
  statusEl.style.color = "#00ff88"; statusEl.style.textShadow = "0 0 8px #00ff88"; statusEl.style.borderColor = "rgba(0,255,136,0.25)";
  scanText.textContent = "SCANNING TARGET..."; scanText.style.color = "#00ff88";
  dot.style.color = "#00ff88"; dot.style.animation = "blink 1.2s step-end infinite";
  scanLine.style.background = "linear-gradient(90deg,transparent,#00ff88,transparent)";
  corners.forEach(c => { c.style.borderColor = "rgba(0,255,136,0.5)"; c.style.boxShadow = "none"; });
}

// ── Laser class ───────────────────────────────────────────────────
class Laser {
  constructor(now) { this.spawn(now); }
  spawn(now) {
    this.x        = 40 + Math.random() * (W - 80);
    this.y        = -220;
    this.speed    = 7 + Math.random() * 5;
    this.width    = 1.5 + Math.random() * 2;
    this.done     = false;
    this.impacted = false;
    this.delay    = now + 200 + Math.pow(Math.random(), 0.5) * 4500;
    const greens  = ["80,255,100","60,230,80","100,255,120","50,200,70","120,255,80","40,255,100"];
    this.color    = greens[Math.floor(Math.random() * greens.length)];
    this.len      = 180 + Math.random() * 120;
  }
  update(now) {
    if (now < this.delay) return;
    this.y += this.speed;
    if (this.y >= H + this.len && !this.impacted) {
      this.impacted = true;
      explosions.push(new Explosion(this.x, H, now));
      this.done = true;
    }
  }
  draw(now) {
    if (now < this.delay || this.done) return;
    const visTop = Math.max(-10, this.y - this.len);
    const visBot = Math.min(H + 10, this.y);
    if (visBot < -10) return;

    ctx.globalCompositeOperation = "screen";

    const grad = ctx.createLinearGradient(0, visTop, 0, visBot);
    grad.addColorStop(0,   "rgba(" + this.color + ",0)");
    grad.addColorStop(0.3, "rgba(" + this.color + ",0.12)");
    grad.addColorStop(1,   "rgba(" + this.color + ",0.55)");
    ctx.beginPath(); ctx.moveTo(this.x, visTop); ctx.lineTo(this.x, visBot);
    ctx.strokeStyle = grad; ctx.lineWidth = this.width * 7;
    ctx.lineCap = "round"; ctx.shadowBlur = 28;
    ctx.shadowColor = "rgba(" + this.color + ",0.9)"; ctx.stroke();

    const g2 = ctx.createLinearGradient(0, visTop, 0, visBot);
    g2.addColorStop(0,   "rgba(" + this.color + ",0)");
    g2.addColorStop(0.4, "rgba(" + this.color + ",0.5)");
    g2.addColorStop(1,   "rgba(" + this.color + ",0.95)");
    ctx.beginPath(); ctx.moveTo(this.x, visTop); ctx.lineTo(this.x, visBot);
    ctx.strokeStyle = g2; ctx.lineWidth = this.width * 2.5; ctx.shadowBlur = 10; ctx.stroke();

    ctx.beginPath(); ctx.moveTo(this.x, visTop); ctx.lineTo(this.x, visBot);
    ctx.strokeStyle = "rgba(220,255,220,0.95)";
    ctx.lineWidth = this.width * 0.5; ctx.shadowBlur = 4; ctx.stroke();

    if (this.y < H + 20) {
      const ty = Math.min(this.y, H + 10);
      const tg = ctx.createRadialGradient(this.x, ty, 0, this.x, ty, this.width * 9);
      tg.addColorStop(0,   "rgba(255,255,255,0.95)");
      tg.addColorStop(0.3, "rgba(" + this.color + ",0.7)");
      tg.addColorStop(1,   "rgba(" + this.color + ",0)");
      ctx.fillStyle = tg; ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.arc(this.x, ty, this.width * 9, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalCompositeOperation = "source-over";
    ctx.shadowBlur = 0;
  }
}

// ── Explosion class ───────────────────────────────────────────────
class Explosion {
  constructor(x, y, now) {
    this.x    = x; this.y = y; this.born = now;
    this.life = 1100 + Math.random() * 900;
    this.size = 180 + Math.random() * 160;
    this.rot  = (Math.random() - 0.5) * 0.7;
    this.flipX= Math.random() > 0.5 ? -1 : 1;
    this.fadeStart = 0.28 + Math.random() * 0.28;
    this.edgeNoise = 0.08 + Math.random() * 0.12;
    this.cropOffX  = 0.1 + Math.random() * 0.15;
    this.cropOffY  = 0.1 + Math.random() * 0.1;
    this.cropW     = 0.55 + Math.random() * 0.15;
    this.cropH     = 0.55 + Math.random() * 0.1;
    this.ringMax   = 60 + Math.random() * 50;
    this.sparks    = [];
    const n = 6 + Math.floor(Math.random() * 10);
    for (let i = 0; i < n; i++) {
      const a = -Math.PI + Math.random() * Math.PI;
      const s = 1.2 + Math.random() * 3.2;
      this.sparks.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 1.2, sz: Math.random()*2+0.3 });
    }
  }
  draw(ctx, now) {
    const age   = now - this.born;
    const ratio = age / this.life;
    if (ratio >= 1) return false;
    const alpha = ratio < 0.18 ? (ratio / 0.18) * 0.8 : 0.8 * (1 - (ratio - 0.18) / 0.82);
    const scale = 0.42 + ratio * 0.6;
    const w = this.size * scale;
    const h = w * 0.75;

    if (imgReady) {
      const tmp   = document.createElement("canvas");
      const tSize = Math.ceil(w * 1.1);
      tmp.width = tSize; tmp.height = tSize;
      const tc = tmp.getContext("2d");
      const iw = explosionImg.naturalWidth, ih = explosionImg.naturalHeight;
      tc.drawImage(explosionImg, iw*this.cropOffX, ih*this.cropOffY, iw*this.cropW, ih*this.cropH, 0, 0, tSize, tSize);
      const maskCanvas = document.createElement("canvas");
      maskCanvas.width = tSize; maskCanvas.height = tSize;
      const mc = maskCanvas.getContext("2d");
      const cx = tSize/2, cy = tSize/2, r = tSize/2;
      const steps = 64;
      mc.beginPath();
      for (let i = 0; i <= steps; i++) {
        const angle = (i / steps) * Math.PI * 2;
        const wobble = 1 + this.edgeNoise * (Math.sin(angle*3.1+this.rot*10)*0.5 + Math.sin(angle*5.7+this.rot*7)*0.3 + Math.sin(angle*2.3+this.rot*13)*0.2);
        const pr = r * wobble;
        i === 0 ? mc.moveTo(cx+Math.cos(angle)*pr, cy+Math.sin(angle)*pr) : mc.lineTo(cx+Math.cos(angle)*pr, cy+Math.sin(angle)*pr);
      }
      mc.closePath();
      const mg = mc.createRadialGradient(cx, cy, r*this.fadeStart, cx, cy, r*1.05);
      mg.addColorStop(0,   "rgba(0,0,0,1)");
      mg.addColorStop(0.6, "rgba(0,0,0,0.7)");
      mg.addColorStop(1,   "rgba(0,0,0,0)");
      mc.fillStyle = mg; mc.fill();
      tc.globalCompositeOperation = "destination-in";
      tc.drawImage(maskCanvas, 0, 0);
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.globalAlpha = alpha;
      ctx.translate(this.x, this.y - h * 0.28);
      ctx.rotate(this.rot);
      ctx.scale(this.flipX, 1);
      ctx.drawImage(tmp, -tSize/2, -tSize/2, tSize, tSize);
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    ctx.globalCompositeOperation = "screen";
    const rp = Math.min(1, age/200);
    ctx.beginPath();
    ctx.ellipse(this.x, this.y, this.ringMax*rp, this.ringMax*rp*0.22, 0, 0, Math.PI*2);
    ctx.strokeStyle = "rgba(80,255,100," + ((1-rp)*0.5) + ")";
    ctx.lineWidth = 1.5; ctx.stroke();

    this.sparks.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.13; p.vx *= 0.97;
      const a = Math.max(0, 1 - ratio*1.6);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.sz*(1-ratio*0.7), 0, Math.PI*2);
      ctx.fillStyle = "rgba(255,160,40,"+a+")";
      ctx.shadowBlur = 5; ctx.shadowColor = "rgba(255,100,0,0.8)";
      ctx.fill(); ctx.shadowBlur = 0;
    });

    ctx.globalCompositeOperation = "source-over";
    ctx.globalAlpha = 1;
    return true;
  }
}

// ── Scene ─────────────────────────────────────────────────────────
function spawnLasers(now) {
  lasers = []; explosions = [];
  for (let i = 0; i < 5; i++) lasers.push(new Laser(now));
}

function draw(now) {
  if (!active) return;
  animId = requestAnimationFrame(draw);
  ctx.clearRect(0, 0, W, H);
  lasers.forEach(l => { l.update(now); l.draw(now); if (l.done) l.spawn(now); });
  explosions = explosions.filter(e => e.draw(ctx, now));
}
